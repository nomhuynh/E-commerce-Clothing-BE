# Database
spring.datasource.url=jdbc:mysql://localhost:3306/ecommerce_clothing
spring.datasource.username=root
spring.datasource.password=your_password

# JPA
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQLDialect

# JWT
jwt.secret=your_jwt_secret
jwt.expiration=86400000

# Google Sign-In (Web client ID — audience for ID token verification; must match FE VITE_GOOGLE_CLIENT_ID)
# google.client.secret is only needed for server-side OAuth code flow, not for GIS ID tokens
google.client.id=your-client-id.apps.googleusercontent.com
google.client.secret=

# Payment - Stripe
payment.stripe.secret-key=sk_test_xxx
payment.stripe.webhook-secret=whsec_xxx

# Payment - VNPay (return URL must be this backend; VNPay redirects browser here, then API redirects to app.front-end-url)
payment.vnpay.tmn-code=YOUR_TMN_CODE
payment.vnpay.hash-secret=YOUR_HASH_SECRET
payment.vnpay.pay-url=https://sandbox.vnpayment.vn/paymentv2/vpcpay.html
payment.vnpay.return-url=http://localhost:8090/api/v1/payments/callback/vnpay

# Cloudinary (avatar + admin product images)
cloudinary.cloud-name=your_cloud_name
cloudinary.api-key=your_api_key
cloudinary.api-secret=your_api_secret

spring.servlet.multipart.enabled=true
spring.servlet.multipart.max-file-size=5MB
spring.servlet.multipart.max-request-size=6MB
