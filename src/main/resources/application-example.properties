# Database
spring.datasource.url=jdbc:mysql://localhost:3306/ecommerce_clothing
spring.datasource.username=root
spring.datasource.password=your_password

# JPA
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQLDialect

# JWT
jwt.secret=your_jwt_secret
jwt.expiration=86400000

# Payment - Stripe
payment.stripe.secret-key=sk_test_xxx
payment.stripe.webhook-secret=whsec_xxx

# Payment - VNPay
payment.vnpay.tmn-code=YOUR_TMN_CODE
payment.vnpay.hash-secret=YOUR_HASH_SECRET
payment.vnpay.pay-url=https://sandbox.vnpayment.vn/paymentv2/vpcpay.html
payment.vnpay.return-url=http://localhost:5173/payment/callback

# Payment - MoMo
payment.momo.endpoint=https://test-payment.momo.vn/v2/gateway/api/create
payment.momo.partner-code=YOUR_PARTNER_CODE
payment.momo.access-key=YOUR_ACCESS_KEY
payment.momo.secret-key=YOUR_SECRET_KEY
payment.momo.return-url=http://localhost:5173/payment/callback

# Payment - ZaloPay
payment.zalopay.endpoint=https://sb-open.zalopay.com.vn/v2/pay
payment.zalopay.app-id=553
payment.zalopay.key1=YOUR_KEY1
payment.zalopay.key2=YOUR_KEY2
payment.zalopay.callback-url=http://localhost:5173/payment/callback
