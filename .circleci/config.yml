version: 2.1

jobs:
  build-and-test:
    docker:
      - image: maven:3.9-eclipse-temurin-25
    steps:
      - checkout
      - restore_cache:
          keys:
            - v1-dependencies-{{ checksum "pom.xml" }}
            - v1-dependencies-
      - run: chmod +x mvnw
      - run:
          name: Build and Test
          command: ./mvnw clean install
      - save_cache:
          paths:
            - ~/.m2
          key: v1-dependencies-{{ checksum "pom.xml" }}

workflows:
  sample:
    jobs:
      - build-and-test